[phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.mbstring", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.zip", "php84Extensions.bcmath", "php84Extensions.exif", "php84Extensions.pcntl", "nginx", "composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan cache:clear",
    "php artisan route:clear",
    "php artisan view:clear",
    "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"